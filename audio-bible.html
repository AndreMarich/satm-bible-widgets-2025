<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Bible Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1f3864 0%, #2d5a8c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #1f3864;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
          20color: #1f3864;
            font-weight: 600;
            font-size: 14px;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            color: #333;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }
      20select:focus {
            outline: none;
            border-color: #1f3864;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1f3864 0%, #2d5a8c 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(31, 56, 100, 0.3);
        }
        button:active {
            transform: translateY(0);
        }
        audio {
            width: 100%;
            margin-top: 20px;
        }
        .loading {
            text-align: center;
            color: #1f3864;
            font-size: 14px;
            padding: 20px;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            border-left: 4px solid #c33;
        }
        .info {
            background: #e8f4f8;
            color: #0066cc;
       20    padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            border-left: 4px solid #0066cc;
            font-size: 14px;
        }
        .voice-tabs {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .voice-tab {
            flex: 1;
            padding: 8px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            background: white;
            color: #1f3864;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .voice-tab.active {
            background: #1f3864;
            color: white;
            border-color: #1f3864;
        }
        .voice-tab:hover:not(.active) {
            border-color: #1f3864;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>&#127925; Listen to Scripture</h1>

        <div class="form-group">
            <label for="bookSelect">Book</label>
            <select id="bookSelect">
                <option value="">Choose a book...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="chapterSelect">Chapter</label>
            <select id="chapterSelect" disabled>
                <option value="">Choose a chapter...</option>
            </select>
        </div>

        <button onclick="loadAudio()">Load Audio</button>

        <div id="audioContainer"></div>
        <div id="infoContainer"></div>
    </div>

    <script>
        // Book name -> API book code mapping (bible.helloao.org)
        const bookCodes = {
            "Matthew": "MAT", "Mark": "MRK", "Luke": "LUK", "John": "JHN",
            "Acts": "ACT", "Romans": "ROM", "1 Corinthians": "1CO", "2 Corinthians": "2CO",
            "Galatians": "GAL", "Ephesians": "EPH", "Philippians": "PHP", "Colossians": "COL",
            "1 Thessalonians": "1TH", "2 Thessalonians": "2TH", "1 Timothy": "1TI",
            "2 Timothy": "2TI", "Titus": "TIT", "Philemon": "PHM", "Hebrews": "HEB",
            "James": "JAS", "1 Peter": "1PE", "2 Peter": "2PE", "1 John": "1JN",
            "2 John": "2JN", "3 John": "3JN", "Jude": "JUD", "Revelation": "REV"
        };

        const books = Object.keys(bookCodes);

        const chapterCounts = {
            "Matthew": 28, "Mark": 16, "Luke": 24, "John": 21, "Acts": 28, "Romans": 16,
            "1 Corinthians": 16, "2 Corinthians": 13, "Galatians": 6, "Ephesians": 6,
            "Philippians": 4, "Colossians": 4, "1 Thessalonians": 5, "2 Thessalonians": 3,
            "1 Timothy": 6, "2 Timothy": 4, "Titus": 3, "Philemon": 1, "Hebrews": 13,
            "James": 5, "1 Peter": 5, "2 Peter": 3, "1 John": 5, "2 John": 1,
            "3 John": 1, "Jude": 1, "Revelation": 22
        };

        // Currently loaded audio links
        let currentAudioLinks = null;
        let activeVoice = 'david';

        // Populate books dropdown
        const bookSelect = document.getElementById('bookSelect');
        books.forEach(book => {
            const option = document.createElement('option');
            option.value = book;
            option.textContent = book;
    20       bookSelect.appendChild(option);
        });

        // Book selected -> populate chapters
        bookSelect.addEventListener('change', function() {
            const chapterSelect = document.getElementById('chapterSelect');
            chapterSelect.innerHTML = '<option value="">Choose a chapter...</option>';
            if (this.value) {
                const chapters = chapterCounts[this.value];
                for (let i = 1; i <= chapters; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = `Chapter ${i}`;
                    chapterSelect.appendChild(option);
                }
                chapterSelect.disabled = false;
            } else {
                chapterSelect.disabled = true;
            }
            document.getElementById('audioContainer').innerHTML = '';
            document.getElementById('infoContainer').innerHTML = '';
        });

        function renderAudioPlayer(book, chapter, voice) {
            const audioUrl = currentAudioLinks[voice];
            const voiceNames = { david: 'David (Male)', hays: 'Hays (Female)', souer: 'Souer (Male)' };
            const audioContainer = document.getElementById('audioContainer');
            const infoContainer = document.getElementById('infoContainer');

            audioContainer.innerHTML = `
                <div class="voice-tabs">
                    ${Object.keys(currentAudioLinks).map(v => `
                        <button class="voice-tab ${v === voice ? 'active' : ''}"
                20           onclick="switchVoice('${v}')">${voiceNames[v] || v}</button>
                    `).join('')}
                </div>
                <audio id="bibleAudio" controls>
                    <source src="${audioUrl}" type="audio/mpeg">
                    Your browser does not support the audio element.
                </audio>
            `;

            infoContainer.innerHTML = `
                <div class="info">
                    <strong>${book} ${chapter}</strong> &mdash; Berean Standard Bible (BSB)<br>
                    Audio provided by <a href="https://bible.helloao.org" target="_blank" style="color:#0066cc">bible.helloao.org</a>
                </div>
            `;
        }

        function switchVoice(voice) {
            if (!currentAudioLinks || !currentAudioLinks[voice]) return;
            activeVoice = voice;
            const book = document.getElementById('bookSelect').value;
            const chapter = document.getElementById('chapterSelect').value;
            renderAudioPlayer(book, chapter, voice);
        }

        async function loadAudio() {
            const book = document.getElementById('bookSelect').value;
            const chapter = document.getElementById('chapterSelect').value;
            const audioContainer = document.getElementById('audioContainer');
            const infoContainer = document.getElementById('infoContainer');

            if (!book || !chapter) {
                audioContainer.innerHTML = '<div class="error">Please select a book and chapter.</div>';
                infoContainer.innerHTML = '';
                return;
            }

            audioContainer.innerHTML = '<div class="loading">Loading audio...</div>';
            infoContainer.innerHTML = '';

            try {
                const code = bookCodes[book];
                const url = `https://bible.helloao.org/api/BSB/${code}/${chapter}.json`;
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                currentAudioLinks = data.thisChapterAudioLinks;
                if (!currentAudioLinks || Object.keys(currentAudioLinks).length === 0) {
                    throw new Error('No audio available for this chapter');
                }

                // Default to 'david' if available, otherwise first available
                activeVoice = currentAudioLinks.david ? 'david' : Object.keys(currentAudioLinks)[0];
                renderAudioPlayer(book, chapter, activeVoice);
            } catch (e) {
                audioContainer.innerHTML = '<div class="error">Error loading audio. Please try again.</div>';
                infoContainer.innerHTML = '';
                console.error(e);
    20       }
        }
    </script>
</body>
</html>
