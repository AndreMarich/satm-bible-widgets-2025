<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scripture Selector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1f3864 0%, #2d5a8c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #1f3864;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #1f3864;
            font-weight: 600;
            font-size: 14px;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 16px;
            color: #333;
            background: white;
            cursor: pointer;
            transition: border-color 0.3s;
        }
        select:focus {
            outline: none;
            border-color: #1f3864;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #1f3864 0%, #2d5a8c 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(31, 56, 100, 0.3);
        }
        button:active {
            transform: translateY(0);
        }
        .verses-container {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #e0e0e0;
        }
        .verse {
            background: #f5f5f5;
            padding: 15px;
            border-left: 4px solid #bf9000;
            margin-bottom: 15px;
            border-radius: 4px;
            line-height: 1.6;
        }
        .verse-reference {
            color: #1f3864;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .verse-text {
            color: #333;
            font-size: 15px;
        }
        .loading {
            text-align: center;
            color: #1f3864;
            font-size: 14px;
            padding: 20px;
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            border-left: 4px solid #c33;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📖 Select Scripture</h1>
        
        <div class="form-group">
            <label for="bookSelect">Book</label>
            <select id="bookSelect">
                <option value="">Choose a book...</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="chapterSelect">Chapter</label>
            <select id="chapterSelect" disabled>
                <option value="">Choose a chapter...</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="verseSelect">Verse</label>
            <select id="verseSelect" disabled>
                <option value="">Choose a verse...</option>
            </select>
        </div>
        
        <button onclick="loadVerses()">Load Scripture</button>
        
        <div id="versesContainer"></div>
    </div>

    <script>
        const books = ["Genesis", "Exodus", "Leviticus", "Numbers", "Deuteronomy", "Joshua", "Judges", "Ruth", "1 Samuel", "2 Samuel", "1 Kings", "2 Kings", "1 Chronicles", "2 Chronicles", "Ezra", "Nehemiah", "Esther", "Job", "Psalms", "Proverbs", "Ecclesiastes", "Isaiah", "Jeremiah", "Lamentations", "Ezekiel", "Daniel", "Hosea", "Joel", "Amos", "Obadiah", "Jonah", "Micah", "Nahum", "Habakkuk", "Zephaniah", "Haggai", "Zechariah", "Malachi", "Matthew", "Mark", "Luke", "John", "Acts", "Romans", "1 Corinthians", "2 Corinthians", "Galatians", "Ephesians", "Philippians", "Colossians", "1 Thessalonians", "2 Thessalonians", "1 Timothy", "2 Timothy", "Titus", "Philemon", "Hebrews", "James", "1 Peter", "2 Peter", "1 John", "2 John", "3 John", "Jude", "Revelation"];
        
        const chapterCounts = {
            "Genesis": 50, "Exodus": 40, "Leviticus": 27, "Numbers": 36, "Deuteronomy": 34,
            "Joshua": 24, "Judges": 21, "Ruth": 4, "1 Samuel": 31, "2 Samuel": 24,
            "1 Kings": 22, "2 Kings": 25, "1 Chronicles": 29, "2 Chronicles": 36, "Ezra": 10,
            "Nehemiah": 13, "Esther": 10, "Job": 42, "Psalms": 150, "Proverbs": 31,
            "Ecclesiastes": 12, "Isaiah": 66, "Jeremiah": 52, "Lamentations": 5, "Ezekiel": 48,
            "Daniel": 12, "Hosea": 14, "Joel": 3, "Amos": 9, "Obadiah": 1,
            "Jonah": 4, "Micah": 7, "Nahum": 3, "Habakkuk": 3, "Zephaniah": 3,
            "Haggai": 2, "Zechariah": 14, "Malachi": 4, "Matthew": 28, "Mark": 16,
            "Luke": 24, "John": 21, "Acts": 28, "Romans": 16, "1 Corinthians": 16,
            "2 Corinthians": 13, "Galatians": 6, "Ephesians": 6, "Philippians": 4, "Colossians": 4,
            "1 Thessalonians": 5, "2 Thessalonians": 3, "1 Timothy": 6, "2 Timothy": 4, "Titus": 3,
            "Philemon": 1, "Hebrews": 13, "James": 5, "1 Peter": 5, "2 Peter": 3,
            "1 John": 5, "2 John": 1, "3 John": 1, "Jude": 1, "Revelation": 22
        };

        // Populate books
        const bookSelect = document.getElementById('bookSelect');
        books.forEach(book => {
            const option = document.createElement('option');
            option.value = book;
            option.textContent = book;
            bookSelect.appendChild(option);
        });

        bookSelect.addEventListener('change', function() {
            const chapterSelect = document.getElementById('chapterSelect');
            chapterSelect.innerHTML = '<option value="">Choose a chapter...</option>';
            if (this.value) {
                const chapters = chapterCounts[this.value];
                for (let i = 1; i <= chapters; i++) {
                    const option = document.createElement('option');
                    option.value = i;
                    option.textContent = `Chapter ${i}`;
                    chapterSelect.appendChild(option);
                }
                chapterSelect.disabled = false;
            } else {
                chapterSelect.disabled = true;
            }
            document.getElementById('verseSelect').disabled = true;
        });

        document.getElementById('chapterSelect').addEventListener('change', async function() {
            const verseSelect = document.getElementById('verseSelect');
            verseSelect.innerHTML = '<option value="">Choose a verse...</option>';
            if (this.value) {
                try {
                    const book = document.getElementById('bookSelect').value;
                    const bookUrl = book.toLowerCase().replace(/\s/g, '-').replace(/[0-3]/g, m => ['first', 'second', 'third'][m]);
                    const response = await fetch(`https://helloao.org/v1/chapters/bsb/${bookUrl}/${this.value}`);
                    const data = await response.json();
                    if (data.verses) {
                        data.verses.forEach(verse => {
                            const option = document.createElement('option');
                            option.value = verse.verse;
                            option.textContent = `Verse ${verse.verse}`;
                            verseSelect.appendChild(option);
                        });
                        verseSelect.disabled = false;
                    }
                } catch (e) {
                    console.error('Error loading verses:', e);
                    verseSelect.disabled = true;
                }
            } else {
                verseSelect.disabled = true;
            }
        });

        async function loadVerses() {
            const book = document.getElementById('bookSelect').value;
            const chapter = document.getElementById('chapterSelect').value;
            const verse = document.getElementById('verseSelect').value;
            const container = document.getElementById('versesContainer');

            if (!book || !chapter) {
                container.innerHTML = '<div class="error">Please select a book and chapter.</div>';
                return;
            }

            container.innerHTML = '<div class="loading">Loading scripture...</div>';

            try {
                const bookUrl = book.toLowerCase().replace(/\s/g, '-').replace(/^(\d+)\s/, (m, num) => {
                    return ['', 'first-', 'second-', 'third-'][num];
                });
                
                const response = await fetch(`https://helloao.org/v1/chapters/bsb/${bookUrl}/${chapter}`);
                const data = await response.json();

                if (data.verses) {
                    let versesToShow = data.verses;
                    
                    if (verse) {
                        const startIndex = versesToShow.findIndex(v => v.verse === parseInt(verse));
                        if (startIndex !== -1) {
                            versesToShow = versesToShow.slice(startIndex, startIndex + 3);
                        }
                    } else {
                        versesToShow = versesToShow.slice(0, 3);
                    }

                    let html = '<div class="verses-container">';
                    versesToShow.forEach(v => {
                        html += `
                            <div class="verse">
                                <div class="verse-reference">${book} ${chapter}:${v.verse}</div>
                                <div class="verse-text">${v.text}</div>
                            </div>
                        `;
                    });
                    html += '</div>';
                    container.innerHTML = html;
                } else {
                    container.innerHTML = '<div class="error">Could not load scripture. Please try again.</div>';
                }
            } catch (e) {
                container.innerHTML = '<div class="error">Error loading scripture. Please check your selection.</div>';
                console.error(e);
            }
        }
    </script>
</body>
</html>
